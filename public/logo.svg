<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background with gradient -->
  <rect x="5" y="5" width="90" height="90" rx="18" ry="18" fill="url(#bgGradient)"/>
  
  <!-- Central circle representing coin/token -->
  <circle cx="50" cy="50" r="12" fill="white" opacity="0.95" filter="url(#glow)"/>
  
  <!-- Interconnected nodes representing blockchain network -->
  <circle cx="25" cy="25" r="5" fill="white" opacity="0.8"/>
  <circle cx="75" cy="25" r="5" fill="white" opacity="0.8"/>
  <circle cx="25" cy="75" r="5" fill="white" opacity="0.8"/>
  <circle cx="75" cy="75" r="5" fill="white" opacity="0.8"/>
  
  <!-- Connecting lines representing network connections -->
  <line x1="50" y1="38" x2="25" y2="25" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="75" y2="25" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="25" y2="75" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="75" y2="75" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Additional connection lines for network effect -->
  <line x1="30" y1="30" x2="38" y2="38" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="70" y1="30" x2="62" y2="38" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="30" y1="70" x2="38" y2="62" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="70" y1="70" x2="62" y2="62" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
